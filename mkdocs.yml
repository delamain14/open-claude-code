site_name: Open Claude Code
site_description: A comprehensive documentation system for Open Claude Code
site_url: https://delamain14.github.io/open-claude-code/
repo_url: https://github.com/delamain14/open-claude-code
repo_name: open-claude-code
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - scheme: light
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: dark
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - zh
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            Getting Started: 快速开始
            Installation: 安装指南
            Configuration: 配置指南
            Multi-Provider Support: 多提供商支持
            The Agent Loop: Agent 循环
            Architecture & Execution: 架构与执行
            Architecture Overview: 架构概览
            Entrypoints: 入口点
            Tool Use: 工具使用
            Tool System: 工具系统
            Tools API: 工具 API
            TodoWrite: 任务系统
            V2 Task System: V2 任务系统
            Commands API: 命令 API
            Subagents: 子 Agent
            Spawning & Isolation: 生成与隔离
            Skills: 技能
            Skill System: 技能系统
            Context Compact: 上下文压缩
            Compression & Budgeting: 压缩与预算
            Tasks: 任务
            TodoWrite + Task System: TodoWrite + 任务系统
            Task Management: 任务管理
            Background Tasks: 后台任务
            Async Execution: 异步执行
            Agent Teams: Agent Teams
            Team Structure & Coordination: 团队结构与协调
            Communication Standards: 通信标准
            Autonomous Agents: 自主 Agent
            Self-Directed Execution: 自主执行
            Worktree + Task Isolation: 工作树与任务隔离
            Git Isolation: Git 隔离
            Architecture: 架构
            Services: 服务层
            Tools System: 工具系统
            Commands System: 命令系统
            UI Layer: UI 层
            Types: 类型定义
            Utils: 工具函数
            Development: 开发
            Setup: 环境设置
            Contributing: 贡献指南

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md
    - Multi-Provider Support: getting-started/MULTI_PROVIDER.md
  - The Agent Loop:
    - Architecture & Execution: core/agent-loop.md
    - Architecture Overview: architecture/overview.md
    - Entrypoints: architecture/entrypoints.md
  - Tool Use:
    - Tool System: core/tool-use.md
    - Tools API: api/tools.md
  - TodoWrite + Task System:
    - V2 Task System: core/todowrite.md
    - Commands API: api/commands.md
  - Subagents:
    - Spawning & Isolation: concepts/subagents.md
  - Skills:
    - Skill System: concepts/skills.md
  - Context Compact:
    - Compression & Budgeting: concepts/context-compact.md
  # - Tasks:
  #   - Task Management: core/todowrite.md
  - Background Tasks:
    - Async Execution: tasks/background-tasks.md
  - Agent Teams:
    - Team Structure & Coordination: agents/agent-teams.md
    - Communication Standards: agents/team-protocols.md
  - Autonomous Agents:
    - Self-Directed Execution: agents/autonomous-agents.md
  - Worktree + Task Isolation:
    - Git Isolation: advanced/worktree-isolation.md
  - Architecture:
    - Services: architecture/services.md
    - Tools System: architecture/tools.md
    - Commands System: architecture/commands.md
    - UI Layer: architecture/ui.md
    - Types: architecture/types.md
    - Utils: architecture/utils.md
  - Development:
    - Setup: development/setup.md
    - Contributing: development/contributing.md

markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
  - tables
  - attr_list
